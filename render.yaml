services:
  - type: web
    runtime: static
    name: hiremate-frontend
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: REACT_APP_API_BASE_URL
        fromService:
          type: web
          name: hiremate-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: REACT_APP_RAZORPAY_KEY_ID
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    runtime: node
    name: hiremate-backend
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /api/hello
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        fromService:
          type: web
          name: hiremate-frontend
          envVarKey: RENDER_EXTERNAL_URL
      - key: ATS_SERVICE_URL
        fromService:
          type: web
          name: hiremate-ats
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    runtime: python
    name: hiremate-ats
    plan: free
    rootDir: backend/AI
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn ats:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 180
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: FLASK_DEBUG
        value: "0"
      - key: ATS_VERBOSE_DEBUG
        value: "0"
